<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貸款轉貸提案</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 14px; background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif; color: #333; }
  .wrap { max-width: 520px; margin: 0 auto; }
  h1 { color: #1a5490; font-size: 22px; text-align: center; margin: 0 0 4px; }
  .sub { color: #888; font-size: 13px; text-align: center; margin: 0 0 18px; }
  .card { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; }
  .card h3 { margin: 0 0 14px; font-size: 17px; }
  .name-input { border: none; border-bottom: 1.5px dashed currentColor; background: transparent; font-size: inherit; font-weight: bold; color: inherit; width: 100%; outline: none; padding: 2px 0; }
  .name-input:focus { border-bottom-style: solid; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  input[type=number] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  .field { margin-bottom: 14px; }
  .hint { font-size: 12px; color: #999; margin: 6px 0 0; }
  .calc { font-size: 13px; font-weight: bold; margin: 6px 0 0; }
  .stage { background: #f7f9fb; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
  .stage-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .stage-head span { font-size: 13px; color: #666; font-weight: bold; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid2 input { padding: 10px; }
  .grid2 label { font-size: 11px; }
  .addbtn { width: 100%; padding: 10px; border: 1px dashed; border-radius: 8px; background: none; font-size: 14px; cursor: pointer; }
  .rm { background: none; border: none; color: #ff6b6b; font-size: 13px; cursor: pointer; }
  .seg { display: flex; gap: 6px; margin-bottom: 8px; }
  .seg button { flex: 1; padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 13px; cursor: pointer; color: #888; }
  .seg button.on { background: #1a5490; color: #fff; border-color: #1a5490; }
  .export-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .export-bar button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: #fff; }
  #btnPdf { background: #e8505b; }
  #btnImg { background: #1a5490; }
  .export-bar button:disabled { opacity: .5; cursor: wait; }
  #proposal { background: #fff; padding: 22px; border-radius: 12px; }
  #proposal .ptitle { text-align: center; margin: 0 0 4px; color: #1a5490; font-size: 20px; }
  #proposal .pdate { text-align: center; color: #aaa; font-size: 12px; margin: 0 0 18px; }
  #proposal .sect { font-size: 15px; font-weight: bold; color: #222; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #eee; }
  #proposal .sect:first-of-type { margin-top: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 6px; text-align: right; vertical-align: top; }
  th:first-child, td:first-child { text-align: left; }
  thead th { background: #f4f4f4; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  .c1 { color: #e8505b; }
  .c2 { color: #14a098; }
  .pill { padding: 2px 8px; border-radius: 6px; font-weight: bold; }
  .pill.r { background: #ffe3e3; color: #e8505b; }
  .pill.g { background: #e6f4ea; color: #14a098; }
  .hl { background: #e6f4ea; }
  .hl td { font-weight: bold; color: #2f9e44; }
  .small { font-size: 11px; color: #999; font-weight: normal; }
  .feebox { background: #fff7e6; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.9; }
  .feebox b { color: #d68f00; }
  .gracebox { background: #eef4fb; padding: 10px 12px; border-radius: 8px; font-size: 12px; color: #547; line-height: 1.7; margin-top: 8px; }
  .benefit { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
  .benefit .n { color: #1a5490; font-weight: bold; white-space: nowrap; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 12px; }
  .bar-row .bl { width: 56px; }
  .bar-track { flex: 1; background: #f0f0f0; border-radius: 6px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; color: #fff; font-size: 11px; }
  .segrow { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #f5f5f5; }
  .disclaimer { font-size: 11px; color: #aaa; text-align: center; margin-top: 16px; }
  .repay-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .repay-toggle button { flex: 1; padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 13px; cursor: pointer; color: #888; }
  .repay-toggle button.on { background: #1a5490; color: #fff; border-color: #1a5490; }
  .io-warn { background: #fff3cd; border: 1px solid #ffc107; padding: 10px 12px; border-radius: 8px; font-size: 12px; color: #856404; margin-top: 8px; line-height: 1.6; }
  .loan1b-wrap { border: 1px dashed #e8505b; border-radius: 10px; padding: 14px; margin-top: 4px; margin-bottom: 14px; background: #fff8f8; }
  .loan1b-wrap h4 { margin: 0 0 12px; font-size: 14px; color: #e8505b; }
  .header-card { border-left: 4px solid #6c5ce7; }
  .header-card h3 { color: #6c5ce7; }
  .header-card input[type=text], .header-card input[type=date] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  #proposal .pheader { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 0 14px; margin-bottom: 18px; border-bottom: 2px solid #1a5490; }
  #proposal .pheader-left .client { font-size: 20px; font-weight: bold; color: #1a5490; }
  #proposal .pheader-left .client-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
  #proposal .pheader-right { text-align: right; font-size: 12px; color: #888; line-height: 1.8; }
  #proposal .keypoint { background: #eef4fb; border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; font-size: 14px; color: #547; line-height: 1.6; }
  #proposal .keypoint b { color: #1a5490; font-size: 19px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>貸款轉貸提案</h1>
  <p class="sub">本息攤還 · 多段利率 · 寬限期 · 回本試算 · 可匯出</p>

  <div class="export-bar">
    <button id="btnPdf">匯出 PDF</button>
    <button id="btnImg">匯出圖片</button>
  </div>

  <!-- 提案抬頭 -->
  <div class="card header-card">
    <h3>提案抬頭（選填）</h3>
    <div class="grid2">
      <div class="field"><label>客戶姓名</label><input type="text" id="clientName" placeholder="例：王大明 先生／小姐"></div>
      <div class="field"><label>業務員</label><input type="text" id="agentName" placeholder="您的姓名"></div>
    </div>
    <div class="field" style="margin-bottom:0"><label>提案日期</label><input type="date" id="proposalDate"></div>
  </div>

  <!-- 方案1 -->
  <div class="card" style="border-left:4px solid #e8505b">
    <h3 style="color:#e8505b"><input class="name-input" id="name1" value="方案 1（現況）"></h3>
    <div class="field"><label>還款方式</label>
      <div class="repay-toggle" id="toggleRepay1">
        <button data-mode="amort" class="on">本利攤還</button>
        <button data-mode="io">純繳息（到期還本）</button>
      </div>
    </div>
    <div class="field"><label>貸款金額（元）</label><input type="number" id="p1" value="2500000"></div>
    <div class="field"><label>期數（月）</label><input type="number" id="n1" value="120"><p class="hint" id="y1"></p></div>
    <div class="field" id="g1wrap"><label>寬限期（選填，月）</label><input type="number" id="g1" placeholder="0 = 無寬限期"><p class="hint">寬限期內只繳息、不還本</p></div>
    <div class="field"><label>第一段利率（%）· 第 1 期起</label><input type="number" step="0.01" id="r1" value="14"></div>
    <div id="stages1"></div>
    <button class="addbtn" id="add1" style="border-color:#e8505b;color:#e8505b">+ 新增分段利率（選填）</button>

    <!-- 第二筆貸款 -->
    <div style="margin-top:14px">
      <button class="addbtn" id="addLoan1b" style="border-color:#e8505b;color:#e8505b">+ 新增第二筆貸款（選填，兩筆合計比較）</button>
    </div>
    <div id="loan1bWrap" style="display:none" class="loan1b-wrap">
      <h4><input class="name-input" id="name1b" value="第二筆貸款（現況）" style="font-size:14px"></h4>
      <div class="field"><label>還款方式</label>
        <div class="repay-toggle" id="toggleRepay1b">
          <button data-mode="amort" class="on">本利攤還</button>
          <button data-mode="io">純繳息（到期還本）</button>
        </div>
      </div>
      <div class="field"><label>貸款金額（元）</label><input type="number" id="p1b" placeholder="第二筆本金"></div>
      <div class="field"><label>期數（月）</label><input type="number" id="n1b" value="120"><p class="hint" id="y1b"></p></div>
      <div class="field" id="g1bwrap"><label>寬限期（選填，月）</label><input type="number" id="g1b" placeholder="0 = 無寬限期"><p class="hint">寬限期內只繳息、不還本</p></div>
      <div class="field"><label>第一段利率（%）· 第 1 期起</label><input type="number" step="0.01" id="r1b" value="14"></div>
      <div id="stages1b"></div>
      <button class="addbtn" id="add1b" style="border-color:#e8505b;color:#e8505b">+ 新增分段利率（選填）</button>
      <button class="rm" id="removeLoan1b" style="margin-top:10px;display:block">✕ 移除第二筆</button>
    </div>
  </div>

  <!-- 方案2 -->
  <div class="card" style="border-left:4px solid #14a098">
    <h3 style="color:#14a098"><input class="name-input" id="name2" value="方案 2（轉貸後）"></h3>
    <div class="field"><label>還款方式</label>
      <div class="repay-toggle" id="toggleRepay2">
        <button data-mode="amort" class="on">本利攤還</button>
        <button data-mode="io">純繳息（到期還本）</button>
      </div>
    </div>
    <div class="field"><label>貸款金額（元）</label><input type="number" id="p2" value="3000000"></div>
    <div class="field"><label>期數（月）</label><input type="number" id="n2" value="240"><p class="hint" id="y2"></p></div>
    <div class="field" id="g2wrap"><label>寬限期（選填，月）</label><input type="number" id="g2" placeholder="0 = 無寬限期"><p class="hint">寬限期內只繳息、不還本</p></div>
    <div class="field"><label>第一段利率（%）· 第 1 期起</label><input type="number" step="0.01" id="r2" value="2.8"></div>
    <div id="stages2"></div>
    <button class="addbtn" id="add2" style="border-color:#14a098;color:#14a098">+ 新增分段利率（選填）</button>
  </div>

  <!-- 費用（選填）-->
  <div class="card" style="border-left:4px solid #f0a500">
    <h3 style="color:#d68f00">費用明細（選填）</h3>
    <div class="field">
      <label>轉貸服務費</label>
      <div class="seg" id="segSvc"><button data-mode="percent" class="on">按 % 計算</button><button data-mode="amount">直接填金額</button></div>
      <div id="svcPct"><input type="number" step="0.1" id="svcPercent" placeholder="例如 6（% × 新貸款額）"><p class="calc" id="svcCalc" style="color:#d68f00"></p></div>
      <div id="svcAmt" style="display:none"><input type="number" id="svcAmount" placeholder="直接輸入金額（元）"></div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>代墊費用</label>
      <div class="seg" id="segAdv"><button data-mode="percent" class="on">按 % 計算</button><button data-mode="amount">直接填金額</button></div>
      <div id="advPct"><input type="number" step="0.1" id="advPercent" placeholder="例如 4（% × 原貸款額）"><p class="calc" id="advCalc" style="color:#d68f00"></p></div>
      <div id="advAmt" style="display:none"><input type="number" id="advAmount" placeholder="直接輸入金額（元）"></div>
    </div>
  </div>

  <div id="proposal"></div>
</div>

<script>
const state = {
  header: { clientName: '', agentName: '', date: '' },
  loan1: { name: '方案 1（現況）', principal: 2500000, periods: 120, grace: 0, stages: [{ fromMonth: 1, rate: 14 }], interestOnly: false },
  loan1b: { name: '第二筆貸款（現況）', active: false, principal: 0, periods: 120, grace: 0, stages: [{ fromMonth: 1, rate: 14 }], interestOnly: false },
  loan2: { name: '方案 2（轉貸後）', principal: 3000000, periods: 240, grace: 0, stages: [{ fromMonth: 1, rate: 2.8 }], interestOnly: false },
  svc: { mode: 'percent', percent: '', amount: '' },
  adv: { mode: 'percent', percent: '', amount: '' }
};

const nf = (v) => Math.round(v).toLocaleString('en-US');

function payment(bal, annualRate, n) {
  const r = annualRate / 100 / 12;
  if (n <= 0) return 0;
  if (r === 0) return bal / n;
  return bal * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
}

function calcStaged(principal, periods, stages, graceMonths, interestOnly) {
  if (interestOnly) {
    // 純繳息：每月固定繳息，本金期滿一次清償
    const sorted = stages.filter(s => s.rate >= 0 && s.fromMonth >= 1).sort((a, b) => a.fromMonth - b.fromMonth);
    if (!sorted.length || sorted[0].fromMonth !== 1) sorted.unshift({ fromMonth: 1, rate: stages[0] ? stages[0].rate : 0 });
    const rateAt = (month) => { let rate = sorted[0].rate; for (const s of sorted) if (month >= s.fromMonth) rate = s.rate; return rate; };
    let totalInterest = 0;
    const segments = [];
    for (let m = 1; m <= periods; m++) {
      const rate = rateAt(m);
      const pay = principal * (rate / 100 / 12);
      totalInterest += pay;
      const rp = Math.round(pay);
      const last = segments[segments.length - 1];
      if (!last || last.rate !== rate || Math.abs(last.pay - rp) > 1)
        segments.push({ fromMonth: m, type: 'io', rate, pay: rp });
    }
    return {
      segments,
      firstPayment: segments.length ? segments[0].pay : 0,
      afterGracePayment: 0,
      hasGrace: false,
      graceMonths: 0,
      totalInterest: Math.round(totalInterest),
      totalPayments: Math.round(totalInterest + principal),
      multiSegment: segments.length > 1,
      interestOnly: true,
      balloon: principal
    };
  }
  graceMonths = Math.max(0, Math.min(graceMonths || 0, periods));
  const sorted = stages.filter(s => s.rate >= 0 && s.fromMonth >= 1 && s.fromMonth <= periods)
    .sort((a, b) => a.fromMonth - b.fromMonth);
  if (sorted.length === 0 || sorted[0].fromMonth !== 1) sorted.unshift({ fromMonth: 1, rate: stages[0] ? stages[0].rate : 0 });

  const rateAt = (month) => {
    let rate = sorted[0].rate;
    for (const s of sorted) if (month >= s.fromMonth) rate = s.rate;
    return rate;
  };

  let balance = principal, totalInterest = 0, totalPayments = 0;
  let currentPay = 0, lastRate = null;
  const segments = [];

  for (let m = 1; m <= periods; m++) {
    const rate = rateAt(m);
    const mr = rate / 100 / 12;
    let pay, type;
    if (m <= graceMonths) {
      type = 'grace';
      pay = balance * mr; // 只繳息
      totalInterest += pay;
      totalPayments += pay;
    } else {
      type = 'amort';
      if (rate !== lastRate || m === graceMonths + 1) {
        currentPay = payment(balance, rate, periods - m + 1);
        lastRate = rate;
      }
      pay = currentPay;
      const interest = balance * mr;
      balance -= (pay - interest);
      totalInterest += interest;
      totalPayments += pay;
    }
    const rp = Math.round(pay);
    const last = segments[segments.length - 1];
    if (!last || last.type !== type || last.rate !== rate || Math.abs(last.pay - rp) > 1)
      segments.push({ fromMonth: m, type, rate, pay: rp });
  }

  const afterGrace = segments.find(s => s.type === 'amort');
  return {
    segments,
    firstPayment: segments.length ? segments[0].pay : 0,
    afterGracePayment: afterGrace ? afterGrace.pay : 0,
    hasGrace: graceMonths > 0,
    graceMonths,
    totalInterest: Math.round(totalInterest),
    totalPayments: Math.round(totalPayments),
    multiSegment: segments.length > 1,
    interestOnly: false,
    balloon: 0
  };
}

function feeAmount(fee, base) {
  if (fee.mode === 'percent') { const p = parseFloat(fee.percent); return p > 0 ? Math.round(base * p / 100) : 0; }
  const a = parseFloat(fee.amount); return a > 0 ? Math.round(a) : 0;
}

function ratesLabel(loan) {
  const s = [...loan.stages].sort((a, b) => a.fromMonth - b.fromMonth);
  if (s.length === 1) return s[0].rate + '%';
  return s.map(x => '第' + x.fromMonth + '期 ' + x.rate + '%').join('<br>');
}

function renderStages(loanKey, containerId) {
  const loan = state[loanKey];
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  loan.stages.slice(1).forEach((stage, i) => {
    const idx = i + 1;
    const div = document.createElement('div');
    div.className = 'stage';
    div.innerHTML =
      '<div class="stage-head"><span>第 ' + (idx + 1) + ' 段（選填）</span><button class="rm">移除</button></div>' +
      '<div class="grid2"><div><label>第幾期起</label><input type="number" class="sf" value="' + stage.fromMonth + '"></div>' +
      '<div><label>利率（%）</label><input type="number" step="0.01" class="sr" value="' + stage.rate + '"></div></div>';
    div.querySelector('.rm').onclick = () => { loan.stages.splice(idx, 1); renderStages(loanKey, containerId); render(); };
    div.querySelector('.sf').oninput = (e) => { loan.stages[idx].fromMonth = parseInt(e.target.value) || 1; render(); };
    div.querySelector('.sr').oninput = (e) => { loan.stages[idx].rate = parseFloat(e.target.value) || 0; render(); };
    c.appendChild(div);
  });
}

function render() {
  const L1 = state.loan1, L2 = state.loan2, L1b = state.loan1b;
  const d1a = calcStaged(L1.principal, L1.periods, L1.stages, L1.grace, L1.interestOnly);
  const d1b = L1b.active && L1b.principal > 0
    ? calcStaged(L1b.principal, L1b.periods, L1b.stages, L1b.grace, L1b.interestOnly) : null;
  const d2 = calcStaged(L2.principal, L2.periods, L2.stages, L2.grace, L2.interestOnly);

  // Combined d1 = d1a + optional d1b
  const d1 = d1b ? {
    firstPayment: d1a.firstPayment + d1b.firstPayment,
    afterGracePayment: d1a.afterGracePayment + d1b.afterGracePayment,
    totalInterest: d1a.totalInterest + d1b.totalInterest,
    totalPayments: d1a.totalPayments + d1b.totalPayments,
    hasGrace: d1a.hasGrace || d1b.hasGrace,
    graceMonths: Math.max(d1a.graceMonths, d1b.graceMonths),
    multiSegment: d1a.multiSegment || d1b.multiSegment,
    segments: d1a.segments,
    interestOnly: d1a.interestOnly || d1b.interestOnly,
    balloon: d1a.balloon + d1b.balloon,
    isCombined: true, d1a, d1b
  } : { ...d1a, isCombined: false };

  document.getElementById('y1').textContent = '= ' + (L1.periods / 12).toFixed(1) + ' 年';
  document.getElementById('y2').textContent = '= ' + (L2.periods / 12).toFixed(1) + ' 年';
  if (document.getElementById('y1b')) document.getElementById('y1b').textContent = L1b.active ? '= ' + (L1b.periods / 12).toFixed(1) + ' 年' : '';

  // 純繳息時隱藏寬限期欄
  document.getElementById('g1wrap').style.display = L1.interestOnly ? 'none' : '';
  if (document.getElementById('g1bwrap')) document.getElementById('g1bwrap').style.display = L1b.interestOnly ? 'none' : '';
  document.getElementById('g2wrap').style.display = L2.interestOnly ? 'none' : '';

  const loan1TotalPrincipal = L1.principal + (d1b ? L1b.principal : 0);
  const svcFee = feeAmount(state.svc, L2.principal);
  const advFee = feeAmount(state.adv, loan1TotalPrincipal);
  const totalFee = svcFee + advFee;
  const hasFees = totalFee > 0;
  document.getElementById('svcCalc').textContent = (state.svc.mode === 'percent' && svcFee > 0) ? '= $' + nf(svcFee) : '';
  document.getElementById('advCalc').textContent = (state.adv.mode === 'percent' && advFee > 0) ? '= $' + nf(advFee) : '';

  const monthlySavings = d1.firstPayment - d2.firstPayment;
  const pct = d1.firstPayment > 0 ? (monthlySavings / d1.firstPayment * 100) : 0;
  const paybackMonths = (hasFees && monthlySavings > 0) ? totalFee / monthlySavings : null;
  const netSavings = d1.totalInterest - d2.totalInterest - totalFee;
  const yearsDiff = (L2.periods - L1.periods) / 12;

  const maxPay = Math.max(d1.firstPayment, d2.firstPayment) || 1;
  const bar = (label, val, color) =>
    '<div class="bar-row"><span class="bl">' + label + '</span><div class="bar-track"><div class="bar-fill" style="width:' + (val / maxPay * 100) + '%;background:' + color + '">$' + nf(val) + '</div></div></div>';

  const payCell = (d, isLoan1) => {
    const tag = isLoan1 ? 'r' : 'g';
    let s = '<span class="pill ' + tag + '">$' + nf(d.firstPayment) + '</span>';
    if (d.isCombined) s += '<br><span class="small">（兩筆合計：$' + nf(d.d1a.firstPayment) + ' + $' + nf(d.d1b.firstPayment) + '）</span>';
    if (d.hasGrace && !d.isCombined) s += '<br><span class="small">寬限期內，期滿後 $' + nf(d.afterGracePayment) + '</span>';
    if (d.interestOnly) s += '<br><span class="small" style="color:#e8505b">純繳息，期滿須還本金 $' + nf(d.balloon) + '</span>';
    return s;
  };

  let html = '';
  html += '<h2 class="ptitle">貸款轉貸提案</h2>';

  // 提案抬頭
  const h = state.header;
  const hasHeader = h.clientName || h.agentName || h.date;
  if (hasHeader) {
    const dateStr = h.date ? new Date(h.date + 'T00:00:00').toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
    html += '<div class="pheader">';
    html += '<div class="pheader-left">';
    if (h.clientName) {
      html += '<div class="client-label">敬呈</div>';
      html += '<div class="client">' + h.clientName + ' 您好</div>';
    }
    html += '</div>';
    html += '<div class="pheader-right">';
    if (h.agentName) html += '業務：' + h.agentName + '<br>';
    if (dateStr) html += '日期：' + dateStr;
    html += '</div>';
    html += '</div>';
  } else {
    html += '<p class="pdate">試算日期：' + new Date().toLocaleDateString('zh-TW') + '</p>';
  }

  // 重點結論卡（低調版）
  const interestSaved = d1.totalInterest - d2.totalInterest;
  if (monthlySavings > 0 || interestSaved > 0) {
    let kp = '轉貸後，';
    const parts = [];
    if (monthlySavings > 0) parts.push('每月省下 <b>$' + nf(monthlySavings) + '</b>');
    if (interestSaved > 0) parts.push('總利息估省 <b>$' + nf(interestSaved) + '</b>');
    kp += parts.join('，') + '。';
    html += '<div class="keypoint">' + kp + '</div>';
  }

  html += '<div class="sect">核心數據對比</div>';
  html += '<table><thead><tr><th>項目</th><th class="c1">' + L1.name + '</th><th class="c2">' + L2.name + '</th></tr></thead><tbody>';
  html += '<tr><td>貸款金額</td><td>' + (d1.isCombined ? '$' + nf(L1.principal) + '<br><span class="small">+$' + nf(L1b.principal) + '　' + L1b.name + '</span>' : '$' + nf(L1.principal)) + '</td><td>$' + nf(L2.principal) + '</td></tr>';
  html += '<tr><td>年利率</td><td><span class="pill r">' + ratesLabel(L1) + '</span></td><td><span class="pill g">' + ratesLabel(L2) + '</span></td></tr>';
  html += '<tr><td>還款期</td><td>' + L1.periods + ' 期 (' + (L1.periods / 12).toFixed(1) + '年)</td><td>' + L2.periods + ' 期 (' + (L2.periods / 12).toFixed(1) + '年)</td></tr>';
  if (d1.hasGrace || d2.hasGrace)
    html += '<tr><td>寬限期</td><td>' + (d1.hasGrace ? d1.graceMonths + ' 期' : '無') + '</td><td>' + (d2.hasGrace ? d2.graceMonths + ' 期' : '無') + '</td></tr>';
  html += '<tr><td>每月應繳' + (d1.hasGrace || d2.hasGrace ? '（初期）' : '') + '</td><td>' + payCell(d1, true) + '</td><td>' + payCell(d2, false) + '</td></tr>';
  if (monthlySavings > 0)
    html += '<tr class="hl"><td>每月現金流改善</td><td></td><td>節省 $' + nf(monthlySavings) + ' ↓' + pct.toFixed(1) + '%</td></tr>';
  html += '<tr><td>總利息支出</td><td>$' + nf(d1.totalInterest) + '</td><td>$' + nf(d2.totalInterest) + '</td></tr>';
  html += '</tbody></table>';

  // 月付金階段明細（有寬限期或多段時）
  if (d1.multiSegment || d2.multiSegment) {
    html += '<div class="sect">月付金階段明細</div>';
    [{ d: d1, t: L1.name, c: '#e8505b' }, { d: d2, t: L2.name, c: '#14a098' }].forEach(g => {
      if (!g.d.multiSegment) return;
      html += '<p style="margin:8px 0 2px;font-size:12px;color:#888">' + g.t + '</p>';
      g.d.segments.forEach(s => {
        const kind = s.type === 'grace' ? '寬限期（只繳息）' : s.type === 'io' ? '純繳息' : '一般攤還';
        html += '<div class="segrow"><span style="color:#555">第 ' + s.fromMonth + ' 期起 · ' + s.rate + '% · ' + kind + '</span><span style="color:' + g.c + ';font-weight:bold">$' + nf(s.pay) + '</span></div>';
      });
    });
    if (d1.hasGrace || d2.hasGrace)
      html += '<div class="gracebox">⚠ 寬限期內只繳利息、本金不減少，期滿後月付金會提高，且總利息會比無寬限期時增加。</div>';
  }

  html += '<div class="sect">月付金比較' + (d1.hasGrace || d2.hasGrace ? '（初期）' : '') + '</div>';
  if (d1.isCombined) {
    // 方案1為兩筆合計：堆疊長條，兩筆不同顏色相加
    const w1a = d1.d1a.firstPayment / maxPay * 100;
    const w1b = d1.d1b.firstPayment / maxPay * 100;
    html += '<div class="bar-row"><span class="bl">原貸款</span><div class="bar-track" style="display:flex">' +
      '<div class="bar-fill" style="width:' + w1a + '%;background:#e8505b">$' + nf(d1.d1a.firstPayment) + '</div>' +
      '<div class="bar-fill" style="width:' + w1b + '%;background:#f6a04d">$' + nf(d1.d1b.firstPayment) + '</div>' +
      '</div></div>';
    html += '<div style="font-size:11px;color:#888;margin:2px 0 8px;padding-left:64px">' +
      '<span style="color:#e8505b">■</span> ' + L1.name + '　<span style="color:#f6a04d">■</span> ' + L1b.name +
      '　＝ 合計 $' + nf(d1.firstPayment) + '</div>';
  } else {
    html += bar(L1.name, d1.firstPayment, '#e8505b');
  }
  html += bar(L2.name, d2.firstPayment, '#14a098');
  if (d1.interestOnly || d2.interestOnly) {
    html += '<div class="io-warn">⚠ 純繳息方案：每月只繳利息、本金完全未償還，到期需一次清償本金。';
    if (d1.isCombined) {
      if (d1.d1a.interestOnly && d1.d1a.balloon) html += L1.name + '期滿需清償 $' + nf(d1.d1a.balloon) + '。';
      if (d1.d1b.interestOnly && d1.d1b.balloon) html += L1b.name + '期滿需清償 $' + nf(d1.d1b.balloon) + '。';
    } else if (d1.interestOnly && d1.balloon) {
      html += L1.name + '期滿需清償 $' + nf(d1.balloon) + '。';
    }
    if (d2.interestOnly && d2.balloon) html += L2.name + '期滿需清償 $' + nf(d2.balloon) + '。';
    html += '</div>';
  }

  if (hasFees) {
    html += '<div class="sect">費用明細（收費）</div><div class="feebox">';
    if (svcFee > 0) html += '轉貸服務費：' + (state.svc.mode === 'percent' ? '新貸款額 $' + nf(L2.principal) + ' × ' + state.svc.percent + '% ＝ ' : '') + '<b>$' + nf(svcFee) + '</b><br>';
    if (advFee > 0) html += '代墊費用：' + (state.adv.mode === 'percent' ? '原貸款額 $' + nf(loan1TotalPrincipal) + ' × ' + state.adv.percent + '% ＝ ' : '') + '<b>$' + nf(advFee) + '</b><br>';
    html += '合計一次性費用：<b>$' + nf(totalFee) + '</b></div>';

    html += '<div class="sect">回本速度試算</div><table><tbody>';
    html += '<tr><td>一次性費用</td><td>$' + nf(totalFee) + '</td></tr>';
    html += '<tr><td>每月節省金額</td><td>$' + nf(Math.abs(monthlySavings)) + '</td></tr>';
    html += paybackMonths !== null
      ? '<tr class="hl"><td>費用回本時間</td><td>約 ' + paybackMonths.toFixed(1) + ' 個月</td></tr>'
      : '<tr><td>費用回本時間</td><td>無月省，不適用</td></tr>';
    html += '<tr class="hl"><td>回本後總節省<br><span class="small">(總利息差 − 費用)</span></td><td>$' + nf(netSavings) + '</td></tr>';
    html += '</tbody></table>';
  }

  const r1 = L1.stages[0].rate, r2 = L2.stages[0].rate;
  const rateDrop = r1 - r2;
  const rateDropPct = r1 > 0 ? (rateDrop / r1 * 100) : 0;
  if (monthlySavings > 0 || hasFees || rateDrop > 0) {
    html += '<div class="sect">對客戶的好處</div>';
    const circ = ['①','②','③','④','⑤'];
    let bi = 0;
    if (rateDrop > 0) html += '<div class="benefit"><span class="n">' + circ[bi++] + ' 利率大幅下降</span><span>年利率由 ' + r1 + '% 降至 ' + r2 + '%，調降 ' + rateDrop.toFixed(2) + ' 個百分點（約 ' + rateDropPct.toFixed(0) + '%）</span></div>';
    if (monthlySavings > 0) html += '<div class="benefit"><span class="n">' + circ[bi++] + ' 月繳下降</span><span>每月減少 $' + nf(monthlySavings) + '，現金流壓力立即舒緩</span></div>';
    if (yearsDiff !== 0) html += '<div class="benefit"><span class="n">' + circ[bi++] + ' 還款期' + (yearsDiff > 0 ? '延長' : '縮短') + '</span><span>從 ' + (L1.periods / 12).toFixed(1) + ' 年' + (yearsDiff > 0 ? '拉長' : '縮短') + '至 ' + (L2.periods / 12).toFixed(1) + ' 年</span></div>';
    if (paybackMonths !== null) html += '<div class="benefit"><span class="n">' + circ[bi++] + ' 費用回本</span><span>支付 $' + nf(totalFee) + '，約 ' + paybackMonths.toFixed(1) + ' 個月回本，長期划算</span></div>';
  }

  html += '<p class="disclaimer">本試算僅供參考，實際數字以銀行核貸與帳單為準。</p>';
  document.getElementById('proposal').innerHTML = html;
}

function bind(id, fn) { document.getElementById(id).addEventListener('input', fn); }
bind('name1', e => { state.loan1.name = e.target.value || '方案 1'; render(); });
bind('name1b', e => { state.loan1b.name = e.target.value || '第二筆貸款'; render(); });
bind('name2', e => { state.loan2.name = e.target.value || '方案 2'; render(); });
bind('p1', e => { state.loan1.principal = Number(e.target.value); render(); });
bind('n1', e => { state.loan1.periods = parseInt(e.target.value) || 0; render(); });
bind('g1', e => { state.loan1.grace = parseInt(e.target.value) || 0; render(); });
bind('r1', e => { state.loan1.stages[0].rate = parseFloat(e.target.value) || 0; render(); });
bind('p2', e => { state.loan2.principal = Number(e.target.value); render(); });
bind('n2', e => { state.loan2.periods = parseInt(e.target.value) || 0; render(); });
bind('g2', e => { state.loan2.grace = parseInt(e.target.value) || 0; render(); });
bind('r2', e => { state.loan2.stages[0].rate = parseFloat(e.target.value) || 0; render(); });

// 還款方式切換
function setupRepayToggle(toggleId, loanKey) {
  const tog = document.getElementById(toggleId);
  tog.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      tog.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      state[loanKey].interestOnly = btn.dataset.mode === 'io';
      render();
    };
  });
}
setupRepayToggle('toggleRepay1', 'loan1');
setupRepayToggle('toggleRepay2', 'loan2');

// 第二筆貸款
document.getElementById('addLoan1b').onclick = () => {
  state.loan1b.active = true;
  document.getElementById('loan1bWrap').style.display = 'block';
  document.getElementById('addLoan1b').style.display = 'none';
  renderStages('loan1b', 'stages1b');
  render();
};
document.getElementById('removeLoan1b').onclick = () => {
  state.loan1b.active = false;
  state.loan1b.principal = 0;
  document.getElementById('loan1bWrap').style.display = 'none';
  document.getElementById('addLoan1b').style.display = 'block';
  render();
};
bind('p1b', e => { state.loan1b.principal = Number(e.target.value); render(); });
bind('n1b', e => { state.loan1b.periods = parseInt(e.target.value) || 0; render(); });
bind('g1b', e => { state.loan1b.grace = parseInt(e.target.value) || 0; render(); });
bind('r1b', e => { state.loan1b.stages[0].rate = parseFloat(e.target.value) || 0; render(); });
setupRepayToggle('toggleRepay1b', 'loan1b');

document.getElementById('add1b').onclick = () => {
  if (state.loan1b.stages.length >= 4) return;
  const last = state.loan1b.stages[state.loan1b.stages.length - 1];
  state.loan1b.stages.push({ fromMonth: Math.min(last.fromMonth + 24, state.loan1b.periods), rate: last.rate });
  renderStages('loan1b', 'stages1b'); render();
};
bind('clientName', e => { state.header.clientName = e.target.value.trim(); render(); });
bind('agentName', e => { state.header.agentName = e.target.value.trim(); render(); });
bind('proposalDate', e => { state.header.date = e.target.value; render(); });

document.getElementById('add1').onclick = () => {
  if (state.loan1.stages.length >= 4) return;
  const last = state.loan1.stages[state.loan1.stages.length - 1];
  state.loan1.stages.push({ fromMonth: Math.min(last.fromMonth + 24, state.loan1.periods), rate: last.rate });
  renderStages('loan1', 'stages1'); render();
};
document.getElementById('add2').onclick = () => {
  if (state.loan2.stages.length >= 4) return;
  const last = state.loan2.stages[state.loan2.stages.length - 1];
  state.loan2.stages.push({ fromMonth: Math.min(last.fromMonth + 24, state.loan2.periods), rate: last.rate });
  renderStages('loan2', 'stages2'); render();
};

function setupSeg(segId, key, pctId, amtId) {
  const seg = document.getElementById(segId);
  seg.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      seg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      state[key].mode = btn.dataset.mode;
      document.getElementById(pctId).style.display = btn.dataset.mode === 'percent' ? 'block' : 'none';
      document.getElementById(amtId).style.display = btn.dataset.mode === 'amount' ? 'block' : 'none';
      render();
    };
  });
}
setupSeg('segSvc', 'svc', 'svcPct', 'svcAmt');
setupSeg('segAdv', 'adv', 'advPct', 'advAmt');
bind('svcPercent', e => { state.svc.percent = e.target.value; render(); });
bind('svcAmount', e => { state.svc.amount = e.target.value; render(); });
bind('advPercent', e => { state.adv.percent = e.target.value; render(); });
bind('advAmount', e => { state.adv.amount = e.target.value; render(); });

async function capture() { return await html2canvas(document.getElementById('proposal'), { scale: 2, backgroundColor: '#ffffff', useCORS: true }); }
document.getElementById('btnImg').onclick = async function () {
  this.disabled = true; this.textContent = '產生中…';
  try { const c = await capture(); const a = document.createElement('a'); a.download = '轉貸提案.png'; a.href = c.toDataURL('image/png'); a.click(); }
  finally { this.disabled = false; this.textContent = '匯出圖片'; }
};
document.getElementById('btnPdf').onclick = async function () {
  this.disabled = true; this.textContent = '產生中…';
  try {
    const canvas = await capture();
    const img = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageW = pdf.internal.pageSize.getWidth(), pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW, imgH = canvas.height * imgW / canvas.width;
    let heightLeft = imgH, position = 0;
    pdf.addImage(img, 'PNG', 0, position, imgW, imgH); heightLeft -= pageH;
    while (heightLeft > 0) { position -= pageH; pdf.addPage(); pdf.addImage(img, 'PNG', 0, position, imgW, imgH); heightLeft -= pageH; }
    pdf.save('轉貸提案.pdf');
  } finally { this.disabled = false; this.textContent = '匯出 PDF'; }
};

renderStages('loan1', 'stages1');
renderStages('loan2', 'stages2');
// 預設日期為今天
const todayStr = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-').replace(/(\d{4})-(\d{2})-(\d{2})/,'$1-$2-$3');
const todayISO = new Date().toISOString().slice(0,10);
document.getElementById('proposalDate').value = todayISO;
state.header.date = todayISO;
render();
</script>
</body>
</html>
